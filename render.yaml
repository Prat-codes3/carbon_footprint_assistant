services:
  - type: web
    name: carbon-footprint-api
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false   # Set in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set in Render dashboard
      - key: GEMINI_API_KEY
        sync: false   # Set in Render dashboard
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel frontend URL
    healthCheckPath: /api/health
